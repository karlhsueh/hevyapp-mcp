services:
  hevyapp-mcp:
    build: .
    restart: unless-stopped
    ports:
      - "3847:3847"
    environment:
      - HEVY_API_KEY=${HEVY_API_KEY}
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
      - MCP_TRANSPORT=sse
      - PORT=3847
      - SERVER_BASE_URL=${SERVER_BASE_URL}
    volumes:
      - mcp-data:/data

volumes:
  mcp-data:
